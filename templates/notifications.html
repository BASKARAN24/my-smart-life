<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications - MySmartLife</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #0ea5e9;
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f0f9ff;
            display: flex; justify-content: center; padding: 50px 20px;
            margin: 0;
        }

        .notif-card {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 35px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.04);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .header h2 { font-size: 24px; font-weight: 800; color: #0f172a; }
        
        .mark-read {
            font-size: 13px; font-weight: 700; color: var(--sky);
            text-decoration: none; cursor: pointer;
        }

        .notif-item {
            display: flex;
            gap: 18px;
            padding: 20px;
            border-radius: 22px;
            margin-bottom: 12px;
            transition: 0.3s;
            position: relative;
            background: white;
            border: 1px solid transparent;
        }

        .notif-item:hover {
            transform: scale(1.02);
            border-color: #e0f2fe;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        .notif-item.unread::before {
            content: "";
            position: absolute;
            left: 10px; top: 50%; transform: translateY(-50%);
            width: 6px; height: 6px;
            background: var(--sky);
            border-radius: 50%;
        }

        .icon-circle {
            width: 50px; height: 50px;
            background: #f8fafc;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }

        .content h4 { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .content p { font-size: 13px; color: #64748b; line-height: 1.4; margin-bottom: 8px; }
        .content small { font-size: 11px; font-weight: 700; color: #cbd5e1; text-transform: uppercase; }

        .back-btn {
            display: block; text-align: center; margin-top: 30px;
            text-decoration: none; color: #94a3b8; font-weight: 700; font-size: 14px;
        }
        .back-btn:hover { color: var(--sky); }
    </style>
</head>
<body>

<div class="notif-card">
    <div class="header">
        <h2>Notifications</h2>
        <a href="#" class="mark-read">Mark all as read</a>
    </div>

    {% for alert in alerts %}
    <div class="notif-item {% if loop.index == 1 %}unread{% endif %}">
        <div class="icon-circle">
            {{ alert.icon }}
        </div>
        <div class="content">
            <h4>{{ alert.title }}</h4>
            <p>{{ alert.body }}</p>
            <small>{{ alert.time }}</small>
        </div>
    </div>
    {% endfor %}

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
</div>

</body>
</html>
