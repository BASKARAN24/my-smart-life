<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Report - MySmartLife</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --sky: #0ea5e9; --deep: #0369a1; --glass: rgba(255, 255, 255, 0.8); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f9ff; padding: 40px; }
        
        .container { max-width: 800px; margin: auto; background: var(--glass); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        
        /* The Real Progress Ring */
        .progress-card {
            background: linear-gradient(135deg, var(--sky), var(--deep));
            border-radius: 30px; padding: 30px; color: white; display: flex; align-items: center; gap: 30px; margin-bottom: 30px;
        }
        
        .ring {
            width: 100px; height: 100px; border-radius: 50%;
            /* This dynamically fills based on the consistency score */
            background: conic-gradient(white {{ stats.consistency }}, rgba(255,255,255,0.2) 0);
            display: flex; align-items: center; justify-content: center; font-weight: 800; color: white;
            position: relative;
        }
        .ring::after { content: ""; position: absolute; width: 80px; height: 80px; background: var(--deep); border-radius: 50%; z-index: 1; }
        .ring span { position: relative; z-index: 2; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .stat-box { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .stat-box h1 { color: var(--sky); margin: 5px 0; }
        .stat-box p { font-size: 12px; color: #64748b; font-weight: 700; text-transform: uppercase; }
        
        .back-btn { display: block; text-align: center; margin-top: 30px; text-decoration: none; color: #94a3b8; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 30px;">Life Performance Report 📑</h2>

    <div class="progress-card">
        <div class="ring">
            <span>{{ stats.consistency }}</span>
        </div>
        <div>
            <h3 style="margin-bottom: 5px;">Consistency Score</h3>
            <p style="opacity: 0.9;">Based on your mood logs and task activity over the last 7 days.</p>
        </div>
    </div>

    <div class="grid">
        <div class="stat-box">
            <p>Active Tasks</p>
            <h1>{{ stats.tasks_done }}</h1>
        </div>
        <div class="stat-box">
            <p>Peak Mood</p>
            <h1>{{ stats.avg_mood }}</h1>
        </div>
        <div class="stat-box">
            <p>Target Cal</p>
            <h1>{{ stats.calories_avg }}</h1>
        </div>
    </div>

    <a href="/dashboard" class="back-btn">← Return to Dashboard</a>
</div>

</body>
</html>
