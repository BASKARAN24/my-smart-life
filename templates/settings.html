<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - MySmartLife</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --sky: #0ea5e9; --red: #ef4444; --glass: rgba(255, 255, 255, 0.7); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f0f9ff; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            margin: 0;
        }
        .settings-card {
            width: 100%; max-width: 500px;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px; border: 1px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar {
            width: 80px; height: 80px; background: linear-gradient(135deg, #0ea5e9, #0369a1);
            border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 30px; font-weight: 800;
        }
        label { display: block; font-weight: 800; font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        input[type="text"], input[type="email"] {
            width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #e2e8f0;
            background: white; margin-bottom: 20px; font-family: inherit;
        }
        .save-btn {
            width: 100%; padding: 16px; background: var(--sky); color: white;
            border: none; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2); }
        
        .danger-zone {
            margin-top: 30px; padding-top: 20px; border-top: 1px dashed #cbd5e1;
        }
        .delete-btn {
            background: none; border: none; color: var(--red); font-weight: 700;
            cursor: pointer; font-size: 13px; padding: 0;
        }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #94a3b8; font-size: 14px; }
    </style>
</head>
<body>

<div class="settings-card">
    <div class="profile-header">
        <div class="avatar">{{ user[0][0] }}</div>
        <h2 style="margin: 0; color: #0f172a;">Account Settings</h2>
        <p style="color: #64748b; font-size: 14px;">Manage your profile and preferences</p>
    </div>

    <form method="POST">
        <label>Display Name</label>
        <input type="text" name="username" value="{{ user[0] }}" required>

        <label>Email Address</label>
        <input type="email" value="{{ user[1] }}" disabled style="background: #f8fafc; color: #94a3b8; cursor: not-allowed;">

        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
            <input type="checkbox" id="notif" checked>
            <label for="notif" style="margin: 0; text-transform: none; font-size: 14px; color: #1e293b;">Receive AI lifestyle weekly summaries</label>
        </div>

        <button type="submit" class="save-btn">Save Changes</button>
    </form>

    <div class="danger-zone">
        <p style="font-size: 12px; color: #64748b; margin-bottom: 10px;">Warning: This action is permanent.</p>
        <button class="delete-btn" onclick="confirmDelete()">Delete Account</button>
    </div>

    <a href="/dashboard" class="back-link">← Cancel and Go Back</a>
</div>

<script>
    function confirmDelete() {
        if(confirm("Are you absolutely sure? All your data will be wiped.")) {
            window.location.href = "/logout"; // In a real app, this would hit a delete route
        }
    }
</script>

</body>
</html>
